<!DOCTYPE html>
<!-- Documento principal da aplicação de portfólio -->
<html lang="pt-BR">

<head>
    <!-- Metadados básicos -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio em React</title>

    <!-- Folha de estilos da página -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonte principal do projeto -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Esse elemento é o ponto de montagem da aplicação React -->
    <div id="root"></div>

    <!-- React e ReactDOM via CDN (boa opção para atividade acadêmica simples) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel permite escrever JSX diretamente no script -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Arquivo da aplicação React -->
    <script type="text/babel" src="script.js"></script>
</body>

</html>
